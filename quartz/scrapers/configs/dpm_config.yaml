# DPM.lol Scraper Config
# No DOM selectors — data is captured via CDP network interception.
# DPM exposes a public JSON API at /v1/players/{puuid}/champions?currentSplit=true.
# This endpoint returns 200 in headless mode without auth cookies.

website:
  name: "DPM.lol"

urls:
  # {slug} = "{GameName}-{TAG}" (# replaced with -, spaces URL-encoded)
  player_champions: "https://dpm.lol/{slug}/champions"

browser:
  headless: true    # headless works — no Cloudflare JS challenge on the API endpoint

timeouts:
  api_response: 15  # seconds to wait for /v1/players/{puuid}/champions response

rate_limits:
  delay_between_accounts: 3
