# Active tournament context — edit this file to switch tournaments.
# All scripts read from here; no paths or season names are hardcoded anywhere else.

tournament: GCS
current_lol_split: S2026
tournament_rounds:
  - S4
current_round: S4
data_dir: data/gcs/s4
raw_csv: data/gcs/s4/raw/gcs_draft_info_s4.csv

# Draft order: [[slot, effective_id], ...] — update before running quartz draft
captain_slots:
  - [1, "superultraray"]
  - [2, "seal"]
  - [3, "SadderBread"]
  - [4, "darianchibuzo"]
  - [5, "gp"]
  - [6, "lucashe"]
  - [7, "donny"]
  - [8, "Numinal"]

# Tournament eligibility — minimum ranked games to be draft-eligible
eligibility:
  primary_split: S2026
  primary_min_games: 30
  backup_split: S2025
  backup_min_games: 50

# CSV column name mapping — update if your Google Form uses different field names
csv_columns:
  discord: "Discord Username"
  riot_id: "Riot ID"
  current_rank: "Stated Current Rank"
  peak_rank: "Stated Peak Rank"
  primary_role: "Primary Role"
  secondary_role: "Secondary Role"
