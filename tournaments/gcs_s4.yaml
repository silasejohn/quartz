# GCS Season 4 — canonical tournament config

tournament: GCS
current_lol_split: S2026
tournament_rounds:
  - S4
current_round: S4
data_dir: data/gcs/s4
raw_csv: data/gcs/s4/raw/gcs_draft_info_s4.csv

# Draft format — structural rules for the simulator
draft_format:
  picks_per_captain: 4
  reorder_after_round: ~        # null = no mid-draft reorder; integer = reorder after that round
  randomize_captain_order: false
  soft_cap_trigger: 45          # if captain + pick1 combined PV < 45, soft cap fires (lower = stronger, so <45 means too strong)
  soft_cap_scale: 3.0           # for each PV below trigger, raise effective R2/R4 threshold by 3×

# Draft order: [[slot, effective_id], ...] — update with pick order before running quartz draft
# Captains (player_type=captain): Boom, BronzeCena, Different#ADC, Geekèé,
#   IAmThePink, JayRich, laramie (bergamot), Luyten, Magdalena Bay, Scrambles
captain_slots:
  - [1,  "Scrambles"]
  - [2,  "laramie (bergamot)"]
  - [3,  "BronzeCena"]
  - [4,  "Luyten"]
  - [5,  "IAmThePink"]
  - [6,  "Different#ADC"]
  - [7,  "JayRich"]
  - [8,  "Boom"]
  - [9,  "Geekèé"]
  - [10, "Magdalena Bay"]

# Tournament eligibility — minimum ranked games to be draft-eligible
eligibility:
  primary_split: S2026
  primary_min_games: 30
  backup_split: S2025
  backup_min_games: 50

# Raw signup sheet adapter
# This CSV has no header row — columns are positional (0-indexed).
# Layout: [0] player name  [1] stated rank  [2] roles  [3] u.gg URL  [4+] form responses
signup_sheet:
  has_header: false
  player_id: 0
  rank: 1
  roles: 2
  opgg_url: ~        # no OP.GG column in this sheet
  ugg_url: 3
  default_region: "NA"

# Google Sheets push target — used by `quartz export --push`
sheets:
  spreadsheet_id: "1mrXmsCER-kXecK4I_useb-cRmL41vYmxdrYHjX0g9dc"
  sheet_name: "[auto update] gcs pvs"
  stats_sheet_name: "[auto update] gcs pool"

# CSV column name mapping — kept for backwards compat with legacy LocalCSVInput path
csv_columns:
  discord: "Discord Username"
  riot_id: "Riot ID"
  current_rank: "Stated Current Rank"
  peak_rank: "Stated Peak Rank"
  primary_role: "Primary Role"
  secondary_role: "Secondary Role"

# Frozen pool stats — written by `quartz pv --freeze`, cleared by `quartz pv --clear`.
