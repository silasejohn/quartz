name: CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  push:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - run: uvx ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - run: uv run pytest tests/ -v --cov=quartz --cov-report=term-missing
